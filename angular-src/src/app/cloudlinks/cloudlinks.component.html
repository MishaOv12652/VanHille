<!-- ══════════════════════════════════════════════
     CLOUDLINKS PAGE
     ══════════════════════════════════════════════ -->
<div class="cl-page margin">

  <!-- ── Page header ── -->
  <div class="cl-page-header" dir="rtl">
    <h2 class="cl-page-title">קישורים לענן</h2>
    <div class="cl-page-actions" *ngIf="auth_service.hasRole('educator','admin')">
      <button class="btn btn-success btn-sm" data-toggle="modal" data-target="#addTableFormModal">+ הוסף טבלה</button>
      <button class="btn btn-danger btn-sm"  data-toggle="modal" data-target="#deleteTableFormModal">מחק טבלה</button>
    </div>
  </div>

  <!-- ── Tables ── -->
  <ng-container *ngIf="tables_array && tables_array.length > 0; else noTables">
    <div *ngFor="let table of tables_array" class="cl-section card-dark">

      <!-- Section heading -->
      <div class="cl-section-header">
        <h3 class="cl-section-title">{{ table.tableId }}</h3>
        <button
          *ngIf="auth_service.hasRole('educator','admin')"
          class="btn btn-info btn-sm cl-add-row-btn"
          (click)="startAdd(table.tableId)">
          + הוסף שורה
        </button>
      </div>

      <!-- Table -->
      <table class="table table-hover cl-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Link</th>
            <th *ngIf="auth_service.hasRole('educator','admin')">Actions</th>
          </tr>
        </thead>
        <tbody>

          <!-- Existing rows -->
          <tr *ngFor="let entry of table.data">
            <ng-container *ngIf="editingEntry && editingEntry.id === entry.id && editTableId === table.tableId; else viewRow">
              <!-- Edit mode -->
              <td><input class="form-control form-control-sm" [(ngModel)]="editingEntry.id"   name="editId"></td>
              <td><input class="form-control form-control-sm" [(ngModel)]="editingEntry.name" name="editName"></td>
              <td><input class="form-control form-control-sm" [(ngModel)]="editingEntry.desc" name="editDesc"></td>
              <td><input class="form-control form-control-sm" [(ngModel)]="editingEntry.url"  name="editUrl"></td>
              <td *ngIf="auth_service.hasRole('educator','admin')" class="cl-actions">
                <button class="btn btn-success btn-sm" (click)="confirmEdit(table)">Save</button>
                <button class="btn btn-default btn-sm"  (click)="editingEntry = null">Cancel</button>
              </td>
            </ng-container>

            <!-- View mode -->
            <ng-template #viewRow>
              <td class="cl-cell-id">{{ entry.id }}</td>
              <td class="cl-cell-name">{{ entry.name }}</td>
              <td class="cl-cell-desc">{{ entry.desc }}</td>
              <td><a [href]="entry.url" target="_blank" class="cl-link">{{ entry.name }}</a></td>
              <td *ngIf="auth_service.hasRole('educator','admin')" class="cl-actions">
                <button class="btn btn-primary btn-sm" (click)="startEdit(entry, table.tableId)">Edit</button>
                <button class="btn btn-danger btn-sm"  (click)="confirmDelete(table, entry)">Delete</button>
              </td>
            </ng-template>
          </tr>

          <!-- Inline add row -->
          <tr *ngIf="addingToTableId === table.tableId" class="cl-add-row">
            <td><input class="form-control form-control-sm" [(ngModel)]="newEntry.id"   name="newId"   placeholder="ID"></td>
            <td><input class="form-control form-control-sm" [(ngModel)]="newEntry.name" name="newName" placeholder="Name"></td>
            <td><input class="form-control form-control-sm" [(ngModel)]="newEntry.desc" name="newDesc" placeholder="Description"></td>
            <td><input class="form-control form-control-sm" [(ngModel)]="newEntry.url"  name="newUrl"  placeholder="URL"></td>
            <td *ngIf="auth_service.hasRole('educator','admin')" class="cl-actions">
              <button class="btn btn-success btn-sm" (click)="confirmAdd(table)">Add</button>
              <button class="btn btn-default btn-sm"  (click)="addingToTableId = ''">Cancel</button>
            </td>
          </tr>

          <!-- Empty state -->
          <tr *ngIf="!table.data || table.data.length === 0">
            <td [attr.colspan]="auth_service.hasRole('educator','admin') ? 5 : 4" class="cl-empty">
              No entries in this table
            </td>
          </tr>

        </tbody>
      </table>
    </div>
  </ng-container>

  <!-- No tables state -->
  <ng-template #noTables>
    <div class="card-dark cl-no-tables">
      <p>No tables found.</p>
      <button
        *ngIf="auth_service.hasRole('educator','admin')"
        class="btn btn-success"
        data-toggle="modal"
        data-target="#addTableFormModal">
        Create the first table
      </button>
    </div>
  </ng-template>

</div>


<!-- ══════════════════════════════════════════════
     ADD TABLE MODAL
     ══════════════════════════════════════════════ -->
<div class="modal fade" id="addTableFormModal" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <h4 class="modal-title">Add Table</h4>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="tableHeader">Table Name</label>
          <input type="text" id="tableHeader" class="form-control" placeholder="Enter table name"
                 [(ngModel)]="tableName" name="tableName">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" data-dismiss="modal" (click)="addTable()">Add</button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════
     DELETE TABLE MODAL
     ══════════════════════════════════════════════ -->
<div class="modal fade" id="deleteTableFormModal" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <h4 class="modal-title">Delete Table</h4>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="tableHeaderToDelete">Table Name</label>
          <input type="text" id="tableHeaderToDelete" class="form-control" placeholder="Enter table name to delete"
                 [(ngModel)]="tableName" name="tableName">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" data-dismiss="modal" (click)="deleteTable()">Delete</button>
      </div>
    </div>
  </div>
</div>
