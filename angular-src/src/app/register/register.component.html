<div class="auth-wrapper">
  <div class="auth-card" dir="rtl">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">∑</div>
      <h2 class="auth-title">יצירת חשבון</h2>
      <p class="auth-subtitle">הצטרפו לפלטפורמת מתמטיקה - למידה ומחקר</p>
    </div>

    <!-- Form -->
    <form (submit)="register()" class="auth-form" novalidate>

      <div class="form-group">
        <label for="reg-email">אימייל</label>
        <input
          id="reg-email"
          type="email"
          name="email"
          [(ngModel)]="email"
          class="form-control"
          placeholder="הכנס אימייל"
          autocomplete="email"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="reg-username">שם משתמש</label>
        <input
          id="reg-username"
          type="text"
          name="username"
          [(ngModel)]="username"
          class="form-control"
          placeholder="הכנס שם משתמש"
          autocomplete="username"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="reg-password">סיסמא</label>
        <input
          id="reg-password"
          type="password"
          name="password"
          [(ngModel)]="password"
          class="form-control"
          placeholder="הכנס סיסמא"
          autocomplete="new-password"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="reg-role">תפקיד</label>
        <select
          id="reg-role"
          name="role"
          [(ngModel)]="role"
          class="form-control"
          [disabled]="roleLocked || loading"
        >
          <option value="student">סטודנט</option>
          <option value="educator">מחנך/ת</option>
          <option value="admin">מנהל</option>
        </select>
        <small *ngIf="roleLocked" class="role-locked-note">
          התפקיד נקבע על ידי ההזמנה
        </small>
      </div>

      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading">
        <ng-container *ngIf="!loading">הרשם</ng-container>
        <ng-container *ngIf="loading">
          <span class="auth-spinner">
            <span></span><span></span><span></span>
          </span>
        </ng-container>
      </button>

    </form>

    <!-- Footer link -->
    <div class="auth-footer">
      כבר יש לכם חשבון?&nbsp;<a [routerLink]="['/login']">התחברו כאן</a>
    </div>

  </div>
</div>
