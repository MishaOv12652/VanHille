<div class="auth-wrapper">
  <div class="auth-card" dir="rtl">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo" style="background: linear-gradient(135deg, #4fa3e0, #1a948e);">Δ</div>
      <h2 class="auth-title">פרטים אישיים</h2>
      <p class="auth-subtitle">מלאו את הפרטים לפני תחילת שאלון ואן-הילה</p>
    </div>

    <!-- Form -->
    <form (submit)="startQuiz()" class="auth-form" novalidate>

      <div class="form-group">
        <label for="vh-id">תעודת זהות</label>
        <input
          id="vh-id"
          type="number"
          [(ngModel)]="ID"
          name="ID"
          class="form-control"
          placeholder="הכנס ת.ז כולל ספרת ביקורת"
        >
      </div>

      <div class="form-group">
        <label for="vh-course">מספר קורס</label>
        <input
          id="vh-course"
          type="number"
          [(ngModel)]="courseNum"
          name="courseNum"
          class="form-control"
          placeholder="הכנס את מס' הקורס"
        >
      </div>

      <div class="form-group">
        <label for="vh-group">קבוצת לימוד</label>
        <input
          id="vh-group"
          type="number"
          [(ngModel)]="groupNum"
          name="groupNum"
          class="form-control"
          placeholder="הכנס את מס' קבוצת לימוד"
        >
      </div>

      <button type="submit" class="btn btn-primary auth-submit">
        התחל שאלון ←
      </button>

    </form>

    <div class="auth-footer">
      השאלון כולל 25 שאלות &nbsp;•&nbsp; זמן: 90 דקות
    </div>

  </div>
</div>
