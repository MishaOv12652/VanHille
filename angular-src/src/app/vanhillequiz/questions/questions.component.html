<!-- ── Quiz in progress ───────────────────────────────── -->
<ng-container *ngIf="!showFinish">

  <!-- Progress bar + timer -->
  <div class="quiz-progress-header" dir="rtl">
    <span class="quiz-progress-label">שאלה {{ qnumber }} מתוך 25</span>
    <div class="quiz-progress-track">
      <div class="quiz-progress-fill" [style.width.%]="(qnumber / 25) * 100"></div>
    </div>
    <div class="quiz-timer-badge">
      ⏱&nbsp;<countdown [config]="counterConfig" (event)="handleCountdownEvent($event)"></countdown>
    </div>
  </div>

  <!-- Question card -->
  <div class="quiz-question-card" dir="rtl">

    <!-- Question body: image + text -->
    <div class="quiz-question-body">
      <img *ngIf="img" class="quiz-question-img" [src]="img" alt="תמונה לשאלה">
      <h3 class="quiz-question-text" [innerHTML]="question"></h3>
    </div>

    <!-- Answer options -->
    <div class="quiz-answers">
      <section *ngFor="let answer of Answers" dir="rtl">
        <input
          id="{{ answer.num }}"
          type="radio"
          class="radio"
          [(ngModel)]="radiogroup"
          name="radiogroup"
          value="{{ answer.num }}"
        >
        <label for="{{ answer.num }}" dir="rtl">{{ answer.ans }}</label>
      </section>
    </div>

    <!-- Navigation buttons -->
    <div class="quiz-nav">
      <button id="next" type="button" class="btn btn-primary"  (click)="saveAnswer()">שאלה הבאה ←</button>
      <button id="back" type="button" class="btn btn-default"  (click)="backQuestion()">→ שאלה קודמת</button>
      <button *ngIf="finish" id="finish" type="button" class="btn btn-success" (click)="calcUser(true)">סיים שאלון ✓</button>
    </div>

  </div>

</ng-container>

<!-- ── Finish screen ──────────────────────────────────── -->
<div *ngIf="showFinish" class="quiz-finish-card" dir="rtl">
  <div class="quiz-finish-icon">✓</div>
  <h2 class="quiz-finish-title">סיימת את השאלון!</h2>
  <p class="quiz-finish-sub">תשובותיך נשמרו בהצלחה. בהצלחה!</p>
</div>
