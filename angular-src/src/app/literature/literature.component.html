<!-- ══════════════════════════════════════════════
     LITERATURE PAGE
     ══════════════════════════════════════════════ -->
<div class="lit-page margin">

  <!-- ── Header row ── -->
  <div class="lit-header" dir="rtl">
    <h2 class="lit-title">ספרות</h2>
    <button
      *ngIf="auth_service.hasRole('educator','admin')"
      class="btn btn-success btn-sm lit-add-btn"
      data-toggle="modal"
      data-target="#addLitEntryModal">
      + הוסף רשומה
    </button>
  </div>

  <!-- ── Filter tabs ── -->
  <div class="lit-filters" dir="rtl">
    <button class="lit-filter-btn" [class.active]="activeFilter === 'all'"         (click)="setFilter('all')">הכל</button>
    <button class="lit-filter-btn" [class.active]="activeFilter === 'research'"    (click)="setFilter('research')">ספרות מחקרית</button>
    <button class="lit-filter-btn" [class.active]="activeFilter === 'educational'" (click)="setFilter('educational')">ספרות לימודית</button>
  </div>

  <!-- ── Table card ── -->
  <div class="card-dark lit-table-card">
    <table class="table table-hover" dir="rtl">
      <thead>
        <tr>
          <th>כותרת</th>
          <th>תיאור</th>
          <th>קישור</th>
          <th>קטגוריה</th>
          <th *ngIf="auth_service.hasRole('educator','admin')">פעולות</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of filteredEntries">
          <td class="lit-cell-title">{{ entry.title }}</td>
          <td class="lit-cell-desc">{{ entry.desc }}</td>
          <td><a [href]="entry.rawUrl" target="_blank" class="lit-link">{{ entry.title }}</a></td>
          <td>
            <span class="lit-badge" [class.lit-badge--research]="entry.category === 'research'">
              {{ entry.categoryLabel }}
            </span>
          </td>
          <td *ngIf="auth_service.hasRole('educator','admin')">
            <button class="btn btn-danger btn-sm" (click)="confirmDelete(entry)">מחק</button>
          </td>
        </tr>

        <!-- Empty state -->
        <tr *ngIf="filteredEntries.length === 0">
          <td [attr.colspan]="auth_service.hasRole('educator','admin') ? 5 : 4" class="lit-empty">
            <div class="lit-empty-inner">
              <span class="lit-empty-icon">📚</span>
              <p>אין רשומות להצגה</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>


<!-- ══════════════════════════════════════════════
     ADD ENTRY MODAL
     ══════════════════════════════════════════════ -->
<div class="modal fade" id="addLitEntryModal" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <h4 class="modal-title">הוספת רשומת ספרות</h4>
      </div>

      <div class="modal-body" dir="rtl">
        <form>
          <div class="form-group">
            <label>כותרת</label>
            <input type="text" class="form-control" [(ngModel)]="newEntry.title" name="title" placeholder="כותרת">
          </div>
          <div class="form-group">
            <label>תיאור</label>
            <textarea class="form-control" [(ngModel)]="newEntry.desc" name="desc" placeholder="תיאור" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>קישור (Google Drive URL)</label>
            <input type="text" class="form-control" [(ngModel)]="newEntry.url" name="url" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>קטגוריה</label>
            <select class="form-control" [(ngModel)]="newEntry.category" name="category">
              <option value="research">ספרות מחקרית</option>
              <option value="educational">ספרות לימודית</option>
            </select>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">ביטול</button>
        <button type="button" class="btn btn-primary" data-dismiss="modal" (click)="addEntry()">הוסף</button>
      </div>

    </div>
  </div>
</div>
