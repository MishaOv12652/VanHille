<div class="auth-wrapper">
  <div class="auth-card" dir="rtl">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">∑</div>
      <h2 class="auth-title">ברוכים הבאים</h2>
      <p class="auth-subtitle">היכנסו לחשבונכם כדי להמשיך</p>
    </div>

    <!-- Form -->
    <form (submit)="login()" class="auth-form" novalidate>

      <div class="form-group">
        <label for="login-username">שם משתמש</label>
        <input
          id="login-username"
          type="text"
          name="username"
          [(ngModel)]="username"
          class="form-control"
          placeholder="הכנס שם משתמש"
          autocomplete="username"
          [disabled]="loading"
        >
      </div>

      <div class="form-group">
        <label for="login-password">סיסמא</label>
        <input
          id="login-password"
          type="password"
          name="password"
          [(ngModel)]="password"
          class="form-control"
          placeholder="הכנס סיסמא"
          autocomplete="current-password"
          [disabled]="loading"
        >
      </div>

      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading">
        <ng-container *ngIf="!loading">התחבר</ng-container>
        <ng-container *ngIf="loading">
          <span class="auth-spinner">
            <span></span><span></span><span></span>
          </span>
        </ng-container>
      </button>

    </form>

    <!-- Footer link -->
    <div class="auth-footer">
      אין לכם חשבון?&nbsp;<a [routerLink]="['/register']">הרשמו כאן</a>
    </div>

  </div>
</div>
